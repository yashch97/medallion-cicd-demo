bundle:
  name: medallion-cicd-demo

include:
  - resources/*.yml

variables:
  catalog_name:
    default: dev_main
  bronze_schema:
    default: bronze
  silver_schema:
    default: silver
  gold_schema:
    default: gold
  env_name:
    default: dev

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://adb-7405612798447322.2.azuredatabricks.net/
    variables:
      catalog_name: dev_main
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      env_name: dev

  uat:
    mode: development
    workspace:
      host: https://adb-7405617324510187.7.azuredatabricks.net/
    variables:
      catalog_name: uat_main
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      env_name: uat

  preprod:
    mode: development
    workspace:
      host: https://adb-7405606408553982.2.azuredatabricks.net/
    variables:
      catalog_name: preprod_main
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      env_name: preprod

